<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Absensi Pegawai - FingRec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 20px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">🖐️ FingRec</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="pegawai.html">Master Pegawai</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="nav-distribusi" href="distribusi.html">Distribusi Akses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="log_absensi.html">Log Absensi</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span id="user-info" class="text-white me-3 fw-bold small"></span>
                <button class="btn btn-sm btn-danger fw-bold" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>
</nav>

<script>
    // 1. CEK SERTIFIKAT LOGIN (SATPAM)
    const userSession = JSON.parse(localStorage.getItem('userFingrec'));
    
    // Kalau nggak ada sertifikat, tendang ke halaman login
    if (!userSession) {
        alert('⚠️ Anda harus login terlebih dahulu!');
        window.location.href = 'index.html';
    } else {
        // Tampilkan nama dan role di pojok kanan atas
        document.getElementById('user-info').innerHTML = `Halo, ${userSession.nama} <span class="badge bg-primary ms-1">${userSession.role}</span>`;
        
        // 2. LOGIKA ROLE (RBAC)
        const currentPage = window.location.pathname;

        // Aturan buat Staff biasa (nggak boleh buka web admin sama sekali)
        if (userSession.role === 'Staff') {
            alert('❌ Akses Ditolak: Staff tidak memiliki akses ke Dashboard Admin.');
            window.location.href = 'index.html';
        }

        // Aturan buat Admin biasa (nggak boleh buka Distribusi)
        if (userSession.role === 'Admin') {
            // Sembunyikan menu distribusi dari navbar biar dia ga bisa ngeklik
            document.getElementById('nav-distribusi').style.display = 'none';
            
            // Kalau dia maksa ngetik URL distribusi.html di browser, tendang!
            if (currentPage.includes('distribusi.html')) {
                alert('❌ Akses Ditolak: Hanya Super Admin yang dapat mengatur Distribusi Pintu.');
                window.location.href = 'pegawai.html';
            }
        }
    }

    // 3. FUNGSI LOGOUT
    function logout() {
        const yakin = confirm("Apakah Anda yakin ingin keluar?");
        if (yakin) {
            localStorage.removeItem('userFingrec'); // Hapus sertifikat
            window.location.href = 'index.html';    // Balik ke halaman login
        }
    }
</script>
<div class="container px-4">
    <h2 class="mb-4">⏱️ Log Absensi Harian</h2>

    <div class="card">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <strong class="fs-5">📊 Data Riwayat Scan Sidik Jari</strong>
            <div>
                <input type="text" id="search-box" class="form-control form-control-sm d-inline-block w-auto me-2" placeholder="Cari Nama / Biro..." onkeyup="cariData()">
                <button class="btn btn-sm btn-light fw-bold" onclick="loadLogAbsensi()">🔄 Refresh Data</button>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="px-3">Waktu Scan</th>
                            <th>NIY</th>
                            <th>Nama Lengkap</th>
                            <th>Biro / Unit</th>
                            <th>Pintu (Sensor)</th>
                            <th class="text-center">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-absensi">
                        <tr><td colspan="6" class="text-center py-4">Memuat riwayat absensi...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. FUNGSI AMBIL DATA DARI NODE.JS
    // ==========================================
    async function loadLogAbsensi() {
        try {
            const response = await fetch('/api/absensi');
            const data = await response.json();
            const tbody = document.getElementById('tabel-absensi');
            tbody.innerHTML = ''; 

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 fw-bold text-muted">Belum ada riwayat absensi hari ini.</td></tr>';
                return;
            }

            data.forEach(row => {
                // Format tanggal dan waktu biar rapi (Standar Indonesia)
                const waktuScan = new Date(row.waktu).toLocaleString('id-ID', {
                    weekday: 'long', year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });

                // Tampilan warna-warni berdasarkan Jenis Absen
                let badgeClass = 'bg-secondary';
                if (row.jenis === 'Login') badgeClass = 'bg-success';          // Hijau buat tepat waktu
                else if (row.jenis === 'Login Late') badgeClass = 'bg-warning text-dark'; // Kuning buat telat
                else if (row.jenis === 'Logout') badgeClass = 'bg-info text-dark';        // Biru buat pulang

                const tr = document.createElement('tr');
                tr.className = "row-log";
                tr.innerHTML = `
                    <td class="px-3 text-muted small">${waktuScan}</td>
                    <td class="fw-bold">${row.niy}</td>
                    <td class="nama-cell fw-bold">${row.nama}</td>
                    <td class="biro-cell text-muted">${row.biro}</td>
                    <td><span class="badge bg-dark">ID: ${row.sensor_id}</span></td>
                    <td class="text-center">
                        <span class="badge ${badgeClass} fs-6">${row.jenis}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("Gagal mengambil data:", error);
            document.getElementById('tabel-absensi').innerHTML = '<tr><td colspan="6" class="text-center py-4 text-danger fw-bold">❌ Gagal terhubung ke server. Pastikan Node.js menyala.</td></tr>';
        }
    }

    // ==========================================
    // 2. FUNGSI PENCARIAN (SEARCH) REALTIME
    // ==========================================
    function cariData() {
        const input = document.getElementById('search-box').value.toLowerCase();
        const rows = document.getElementsByClassName('row-log');
        
        for (let i = 0; i < rows.length; i++) {
            const nama = rows[i].querySelector('.nama-cell').innerText.toLowerCase();
            const biro = rows[i].querySelector('.biro-cell').innerText.toLowerCase();
            
            // Tampilkan baris jika nama atau biro cocok dengan ketikan
            if (nama.includes(input) || biro.includes(input)) {
                rows[i].style.display = "";
            } else {
                rows[i].style.display = "none";
            }
        }
    }

    // Load data otomatis pas web dibuka
    window.onload = loadLogAbsensi;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
