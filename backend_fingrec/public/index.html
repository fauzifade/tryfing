<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Absensi IoT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
        
        .control-panel { background: #ecf0f1; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        
        button { background: #2980b9; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s;}
        button:hover { background: #3498db; }
        button.danger { background: #c0392b; }
        button.danger:hover { background: #e74c3c; }

        #statusMsg { margin-top: 15px; padding: 10px; border-radius: 4px; font-weight: bold; text-align: center; display: none; }
        .success-msg { background: #d4efdf; color: #27ae60; border: 1px solid #27ae60; }
        .error-msg { background: #fadbd8; color: #c0392b; border: 1px solid #c0392b; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.ready { background: #2ecc71; color: white; }
        .badge.empty { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Dashboard Admin Absensi</h1>

    <div class="control-panel">
        <h2>Kontrol Perangkat ESP32</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label>Target Sensor ID</label>
                <input type="text" id="sensorId" value="01" placeholder="Misal: 01">
            </div>
            <div class="form-group">
                <label>Aksi / Perintah</label>
                <select id="actionSelect" onchange="toggleInputs()">
                    <option value="enroll">1. Daftarkan Jari Baru (Register)</option>
                    <option value="restore_all">2. Suntik Data Server ke Alat (Restore All)</option>
                    <option value="delete_all">3. Format Bersih Memori Alat (Delete All)</option>
                </select>
            </div>
        </div>

        <div class="form-row" id="niyInputGroup">
            <div class="form-group">
                <label>Masukkan NIY Karyawan</label>
                <input type="text" id="niyInput" placeholder="Misal: 2026001">
            </div>
        </div>

        <button id="btnSubmit" onclick="kirimPerintah()">Kirim Perintah ke ESP32</button>
        <div id="statusMsg"></div>
    </div>

    <h2>📋 Database Karyawan (Server)</h2>
    <table id="tabelKaryawan">
        <thead>
            <tr>
                <th>ID Jari</th>
                <th>Nama Karyawan</th>
                <th>NIY</th>
                <th>Status Sidik Jari</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // Fungsi untuk menyembunyikan input NIY jika action bukan "enroll"
    function toggleInputs() {
        const action = document.getElementById('actionSelect').value;
        const niyGroup = document.getElementById('niyInputGroup');
        const btn = document.getElementById('btnSubmit');

        if (action === 'enroll') {
            niyGroup.style.display = 'block';
            btn.className = '';
            btn.innerText = 'Mulai Scan Jari (Register)';
        } else if (action === 'restore_all') {
            niyGroup.style.display = 'none';
            btn.className = '';
            btn.innerText = 'Suntik Data ke ESP32';
        } else if (action === 'delete_all') {
            niyGroup.style.display = 'none';
            btn.className = 'danger';
            btn.innerText = 'HAPUS SEMUA DATA DI ESP32';
        }
    }

    // Fungsi menampilkan notifikasi
    function showNotif(msg, isError = false) {
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.style.display = 'block';
        statusDiv.innerText = msg;
        statusDiv.className = isError ? 'error-msg' : 'success-msg';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
    }

    // Mengirim perintah via API POST ke Node.js
    async function kirimPerintah() {
        const sensorId = document.getElementById('sensorId').value;
        const action = document.getElementById('actionSelect').value;
        const niy = document.getElementById('niyInput').value;

        if (action === 'enroll' && !niy) {
            showNotif("NIY tidak boleh kosong untuk registrasi!", true);
            return;
        }

        if (action === 'delete_all' && !confirm("YAKIN INGIN MENGHAPUS SEMUA DATA SIDIK JARI DI ALAT?")) {
            return;
        }

        try {
            const response = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sensorId, action, niy })
            });
            const result = await response.json();
            showNotif(result.message, result.status !== 'success');
        } catch (error) {
            showNotif("Gagal menghubungi server Node.js!", true);
        }
    }

    // Mengambil data database untuk ditampilkan di tabel
async function muatDataTabel() {
        try {
            const response = await fetch('/api/users');
            const users = await response.json();
            const tbody = document.querySelector('#tabelKaryawan tbody');
            tbody.innerHTML = ''; 

            users.forEach(user => {
                const isReady = user.template && user.template.length > 50;
                const statusBadge = isReady 
                    ? '<span class="badge ready">Terekam</span>' 
                    : '<span class="badge empty">Kosong</span>';

                // KUNCI PERBAIKAN: Gunakan user.id, jika kosong pakai user.fingerprintId
                const nomorIdJari = user.id || user.fingerprintId || "Error";

                const row = `<tr>
                    <td>${nomorIdJari}</td>
                    <td>${user.nama}</td>
                    <td>${user.niy}</td>
                    <td>${statusBadge}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error("Gagal memuat tabel:", error);
        }
    }

    // Load data pertama kali dan refresh setiap 5 detik
    toggleInputs();
    muatDataTabel();
    setInterval(muatDataTabel, 5000);
</script>

</body>
</html>
