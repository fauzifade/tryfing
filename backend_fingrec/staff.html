<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data Pegawai - FingRec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background-color: #f4f6f9; padding-top: 20px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; margin-bottom: 20px; }
        .log-box { max-height: 150px; overflow-y: auto; background: #212529; color: #00ff00; padding: 10px; font-family: monospace; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">🖐️ FingRec</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="pegawai.html">Master Pegawai</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="nav-distribusi" href="distribusi.html">Distribusi Akses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="log_absensi.html">Log Absensi</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span id="user-info" class="text-white me-3 fw-bold small"></span>
                <button class="btn btn-sm btn-danger fw-bold" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>
</nav>

<script>
    // 1. CEK SERTIFIKAT LOGIN (SATPAM)
    const userSession = JSON.parse(localStorage.getItem('userFingrec'));
    
    // Kalau nggak ada sertifikat, tendang ke halaman login
    if (!userSession) {
        alert('⚠️ Anda harus login terlebih dahulu!');
        window.location.href = 'index.html';
    } else {
        // Tampilkan nama dan role di pojok kanan atas
        document.getElementById('user-info').innerHTML = `Halo, ${userSession.nama} <span class="badge bg-primary ms-1">${userSession.role}</span>`;
        
        // 2. LOGIKA ROLE (RBAC)
        const currentPage = window.location.pathname;

        // Aturan buat Staff biasa (nggak boleh buka web admin sama sekali)
        if (userSession.role === 'Staff') {
            alert('❌ Akses Ditolak: Staff tidak memiliki akses ke Dashboard Admin.');
            window.location.href = 'index.html';
        }

        // Aturan buat Admin biasa (nggak boleh buka Distribusi)
        if (userSession.role === 'Admin') {
            // Sembunyikan menu distribusi dari navbar biar dia ga bisa ngeklik
            document.getElementById('nav-distribusi').style.display = 'none';
            
            // Kalau dia maksa ngetik URL distribusi.html di browser, tendang!
            if (currentPage.includes('distribusi.html')) {
                alert('❌ Akses Ditolak: Hanya Super Admin yang dapat mengatur Distribusi Pintu.');
                window.location.href = 'pegawai.html';
            }
        }
    }

    // 3. FUNGSI LOGOUT
    function logout() {
        const yakin = confirm("Apakah Anda yakin ingin keluar?");
        if (yakin) {
            localStorage.removeItem('userFingrec'); // Hapus sertifikat
            window.location.href = 'index.html';    // Balik ke halaman login
        }
    }
</script>

<div class="container-fluid px-4">
    <h2 class="mb-4">👥 Master Data Pegawai & Enrolment</h2>

    <div class="row">
        <div class="col-md-4">
            
            <div class="card">
                <div class="card-header bg-primary text-white fw-bold">
                    ➕ Tambah Pegawai Baru
                </div>
                <div class="card-body">
                    <div class="mb-2">
                        <label class="form-label small fw-bold">NIY</label>
                        <input type="text" id="input-niy" class="form-control" placeholder="Contoh: 123456">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-bold">Nama Lengkap</label>
                        <input type="text" id="input-nama" class="form-control" placeholder="Nama Pegawai">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Biro / Unit Kerja</label>
                        <input type="text" id="input-biro" class="form-control" placeholder="Contoh: IT, HRD, Akademik">
                    </div>
                    <button class="btn btn-success w-100 fw-bold" onclick="tambahPegawai()">Simpan Pegawai</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-info text-dark fw-bold">
                    📡 Status Scanner Admin
                </div>
                <div class="card-body">
                    <div id="log-status" class="log-box">
                        <div class="text-muted">Menunggu instruksi scan...</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <strong class="fs-5">📋 Daftar Pegawai</strong>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadDataPegawai()">🔄 Refresh</button>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-3">NIY</th>
                                <th>Nama</th>
                                <th>Biro</th>
                                <th class="text-center">Status Jari</th>
                                <th class="text-center">Aksi (Enrolment)</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-pegawai">
                            <tr><td colspan="5" class="text-center py-4">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. KONEKSI MQTT (Dynamic IP)
    // ==========================================
    const mqttIp = window.location.hostname; 
    const mqttClient = mqtt.connect('ws://' + mqttIp + ':9001');

    mqttClient.on('connect', () => {
        console.log("MQTT Terhubung ke " + mqttIp);
        // Subscribe cuma ke alat admin (misal 01) biar lognya ga campur aduk sama pintu lain
        mqttClient.subscribe('fingerprint/01/status'); 
    });

    mqttClient.on('message', (topic, message) => {
        if (topic.includes('status')) {
            const logBox = document.getElementById('log-status');
            if(logBox.innerHTML.includes('Menunggu')) logBox.innerHTML = '';
            
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML = `<div>[${time}] ${message.toString()}</div>` + logBox.innerHTML;
        }
    });

    // ==========================================
    // 2. API: AMBIL DATA PEGAWAI
    // ==========================================
    async function loadDataPegawai() {
        try {
            const response = await fetch('/api/staff');
            const data = await response.json();
            const tbody = document.getElementById('tabel-pegawai');
            tbody.innerHTML = ''; 

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Belum ada data pegawai.</td></tr>';
                return;
            }

            data.forEach(row => {
                const badgeStatus = row.status_jari === 'Sudah' 
                    ? '<span class="badge bg-success">✅ Tersimpan</span>' 
                    : '<span class="badge bg-danger">❌ Belum</span>';
                
                const btnText = row.status_jari === 'Sudah' ? '🔄 Scan Ulang' : '🖐️ Scan Jari';
                const btnColor = row.status_jari === 'Sudah' ? 'btn-outline-warning' : 'btn-primary';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-3 fw-bold">${row.niy}</td>
                    <td>${row.nama}</td>
                    <td>${row.biro}</td>
                    <td class="text-center">${badgeStatus}</td>
                    <td class="text-center">
                        <button class="btn btn-sm ${btnColor} fw-bold" onclick="triggerScan('${row.niy}', '${row.nama}')">
                            ${btnText}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("Gagal load:", error);
        }
    }

    // ==========================================
    // 3. API: TAMBAH PEGAWAI
    // ==========================================
    async function tambahPegawai() {
        const niy = document.getElementById('input-niy').value;
        const nama = document.getElementById('input-nama').value;
        const biro = document.getElementById('input-biro').value;

        if(!niy || !nama) {
            alert("NIY dan Nama wajib diisi!");
            return;
        }

        try {
            const response = await fetch('/api/staff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ niy, nama, biro })
            });
            const result = await response.json();
            
            if(response.ok) {
                document.getElementById('input-niy').value = '';
                document.getElementById('input-nama').value = '';
                document.getElementById('input-biro').value = '';
                loadDataPegawai();
            } else {
                alert("Gagal: " + result.error);
            }
        } catch (err) {
            alert("Terjadi kesalahan jaringan.");
        }
    }

    // ==========================================
    // 4. API: TRIGGER SCAN JARI DI ALAT ADMIN
    // ==========================================
    async function triggerScan(niy, nama) {
        // Kita kunci/hardcode alat perekamnya ke Sensor 01
        const sensorAdmin = "01"; 
        
        const yakin = confirm(`Ingin mulai rekam sidik jari ke Database untuk:\nNama: ${nama}\nNIY: ${niy} ?\n\n(Siapkan jari di Scanner Admin)`);
        if(!yakin) return;

        document.getElementById('log-status').innerHTML = '<div class="text-warning">Memulai proses scan... Silakan lihat instruksi selanjutnya.</div>';

        try {
            const response = await fetch('/api/trigger-register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ niy: niy, sensor_admin: sensorAdmin })
            });
            
            if(response.ok) {
                setTimeout(loadDataPegawai, 8000); 
            } else {
                const result = await response.json();
                alert("Gagal: " + result.error);
            }
        } catch (err) {
            alert("Gagal menghubungi server Node.js");
        }
    }

    window.onload = loadDataPegawai;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
