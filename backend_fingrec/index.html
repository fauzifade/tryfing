<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FingRec System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h3 class="mb-3 fw-bold text-primary">🖐️ FingRec System</h3>
    <p class="text-muted mb-4">Silakan login menggunakan NIY Anda</p>

    <div class="mb-3 text-start">
        <label class="form-label fw-bold small">Nomor Induk Yayasan (NIY)</label>
        <input type="text" id="input-niy" class="form-control form-control-lg text-center fw-bold" placeholder="Contoh: 00000" onkeypress="handleEnter(event)">
    </div>

    <button id="btn-login" class="btn btn-primary btn-lg w-100 fw-bold" onclick="prosesLogin()">
        Masuk ke Sistem
    </button>
    
    <div id="pesan-error" class="text-danger mt-3 small fw-bold" style="display: none;"></div>
</div>

<script>
    // Cek kalau udah pernah login, langsung lempar ke Dashboard (staff.html)
    window.onload = () => {
        const user = localStorage.getItem('userFingrec');
        if (user) {
            window.location.href = 'staff.html';
        }
    };

    // Biar bisa pencet Enter buat login
    function handleEnter(e) {
        if (e.key === 'Enter') prosesLogin();
    }

    async function prosesLogin() {
        const niy = document.getElementById('input-niy').value;
        const errorBox = document.getElementById('pesan-error');
        const btn = document.getElementById('btn-login');

        if (!niy.trim()) {
            errorBox.innerText = "⚠️ NIY tidak boleh kosong!";
            errorBox.style.display = 'block';
            return;
        }

        btn.innerText = "⏳ Memeriksa...";
        btn.disabled = true;
        errorBox.style.display = 'none';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ niy: niy })
            });

            const result = await response.json();

            if (response.ok) {
                // SIMPAN DATA LOGIN KE BROWSER (Kunci RBAC kita)
                localStorage.setItem('userFingrec', JSON.stringify(result.user));
                
                // Lempar ke halaman Master Pegawai
                window.location.href = 'staff.html';
            } else {
                errorBox.innerText = result.error;
                errorBox.style.display = 'block';
            }
        } catch (err) {
            errorBox.innerText = "❌ Gagal terhubung ke server.";
            errorBox.style.display = 'block';
        } finally {
            btn.innerText = "Masuk ke Sistem";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
